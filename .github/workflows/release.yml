name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    name: Build Windows app
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build backend jar
        run: mvn -B clean package

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Build signed Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          projectPath: .
          tauriScript: cargo tauri
          tagName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseName: YA Music Widget ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'dev-build' }}
          releaseBody: |
            ## YA Music Widget

            Автоматическая сборка.

            ### Внутри
            - HUD / Slim / Orb виджеты
            - Tray/background режим
            - Settings wizard
            - Adaptive performance
            - Windows installer
            - Signed updater metadata
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ya-music-widget-windows
          path: |
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.zip
            src-tauri/target/release/bundle/**/latest.json
            src-tauri/target/release/bundle/**/*.sig
          if-no-files-found: warn
