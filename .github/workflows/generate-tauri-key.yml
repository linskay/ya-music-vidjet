name: Generate Tauri Key

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Generate key
        id: keygen
        run: |
          mkdir -p .keys
          cargo tauri signer generate -w .keys/tauri.key > key_output.txt
          echo "--- TAURI PUBLIC KEY START ---"
          cat .keys/tauri.key.pub
          echo "--- TAURI PUBLIC KEY END ---"
          echo "Private key is uploaded as an artifact. Do not share it."

      - name: Upload private key
        uses: actions/upload-artifact@v4
        with:
          name: tauri-private-key
          path: .keys/tauri.key

      - name: Upload public key
        uses: actions/upload-artifact@v4
        with:
          name: tauri-public-key
          path: .keys/tauri.key.pub
